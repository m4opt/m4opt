# GitHub Actions workflow for testing and continuous integration.
#
# This file performs testing using tox and tox.ini to define and configure the test environments.

name: CI Tests

permissions: {}

on:
  - push
  - pull_request

jobs:
  types:
    name: Python type checking
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Set up python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          cache: pip
          python-version: "3.12"
      - name: Run mypy
        uses: python/mypy@v2.1.0
  # Github Actions supports ubuntu, windows, and macos virtual environments:
  # https://help.github.com/en/actions/reference/virtual-environments-for-github-hosted-runners
  ci_tests:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - name: Python 3.12 with minimal dependencies and coverage checking
            os: ubuntu-latest
            python: '3.12'
            toxenv: py312-test-cov

          - name: Python 3.12 with all optional dependencies and coverage checking
            os: ubuntu-latest
            python: '3.12'
            toxenv: py312-test-alldeps-cov

          - name: Python 3.13 with all optional dependencies and coverage checking
            os: ubuntu-latest
            python: '3.13'
            toxenv: py313-test-alldeps-cov

          - name: Python 3.14 with all optional dependencies and coverage checking
            os: ubuntu-latest
            python: '3.14'
            toxenv: py314-test-alldeps-cov

          # - name: OS X - Python 3.12 with all optional dependencies
          #   os: macos-latest
          #   python: '3.12'
          #   toxenv: py312-test-alldeps

          # - name: Windows - Python 3.12 with all optional dependencies
          #   os: windows-latest
          #   python: '3.12'
          #   toxenv: py312-test-alldeps

          - name: Python 3.12 with oldest supported version of all dependencies
            os: ubuntu-22.04
            python: '3.12'
            toxenv: py312-test-oldestdeps

          # - name: Python 3.12 with latest dev versions of key dependencies
          #   os: ubuntu-latest
          #   python: '3.12'
          #   toxenv: py312-test-devdeps

          # - name: Test building of Sphinx docs
          #   os: ubuntu-latest
          #   python: '3.12'
          #   toxenv: build_docs

    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      with:
        fetch-depth: 0
    - name: Cache Astropy data
      uses: actions/cache@2c8a9bd7457de244a408f35966fab2fb45fda9c8  # v6.0.0
      with:
        key: ${{ matrix.toxenv }}
        path: ~/.astropy/cache
    - name: Set up python ${{ matrix.python }} on ${{ matrix.os }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
      with:
        cache: pip
        python-version: ${{ matrix.python }}
    - name: Install base dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install tox codecov

    - name: Test with tox
      env:
        CPLEX_STUDIO_KEY: ${{ secrets.CPLEX_STUDIO_KEY }}
        GRB_LICENSE_FILE_CONTENTS: ${{ secrets.GRB_LICENSE_FILE_CONTENTS }}
      run: |
        if [ -n "$GRB_LICENSE_FILE_CONTENTS" ]; then
          printenv GRB_LICENSE_FILE_CONTENTS > $HOME/gurobi.lic
        fi
        tox -e ${{ matrix.toxenv }}

    - name: Upload coverage to codecov
      if: contains(matrix.toxenv, '-cov')
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload test results to Codecov
      if: contains(matrix.toxenv, '-cov')
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f  # v7.0.0
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        report_type: test_results
